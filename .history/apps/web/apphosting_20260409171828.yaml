# App Hosting deployment config for the active monorepo app root: apps/web.
# YAML uses indentation and "-" list items. There are no curly braces or trailing commas.
#
# Important: this file is deployment/runtime config, not TypeScript config.
# - tsconfig.json controls TypeScript checking and emit behavior.
# - apphosting.yaml controls App Hosting build/runtime env and Cloud Run settings.
#
# Variable precedence from Firebase docs:
# 1) Firebase console
# 2) apphosting.<env>.yaml
# 3) apphosting.yaml
# 4) Firebase system-provided vars (for example FIREBASE_WEBAPP_CONFIG)
#
# If the same variable is set in both console and this file, console wins.
#
# Reserved-name safety (Firebase App Hosting + Cloud Run):
# - Do not define keys that begin with X_FIREBASE_, X_GOOGLE_, CLOUD_RUN_.
# - Do not define PORT, K_SERVICE, K_REVISION, or K_CONFIGURATION.
# - Prefer project-specific keys (for example ZOOTOPIA_*) for custom variables.

# Cloud Run service settings for this backend.
# See https://firebase.google.com/docs/app-hosting/configure#cloud-run
runConfig:
  minInstances: 0
  # maxInstances: 100
  # concurrency: 80
  # cpu: 1
  # memoryMiB: 512

# Environment variables and secret references.
# See https://firebase.google.com/docs/app-hosting/configure
env:
  # Browser-safe Firebase web config.
  # BUILD-only is enough because NEXT_PUBLIC_* values are bundled at build time.
  - variable: NEXT_PUBLIC_FIREBASE_API_KEY
    value: "AIzaSyC6hGFAPdpN9jAEH39D5lvnadw9JJX3qyY"
    availability:
      - BUILD

  - variable: NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN
    value: "zootopia2026.firebaseapp.com"
    availability:
      - BUILD

  - variable: NEXT_PUBLIC_FIREBASE_PROJECT_ID
    value: "zootopia2026"
    availability:
      - BUILD

  - variable: NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET
    value: "zootopia2026.firebasestorage.app"
    availability:
      - BUILD

  - variable: NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID
    value: "38079185268"
    availability:
      - BUILD

  - variable: NEXT_PUBLIC_FIREBASE_APP_ID
    value: "1:38079185268:web:adcd16b5e94d3d8c52ec21"
    availability:
      - BUILD

  # Settings phone OTP additive reCAPTCHA Enterprise contract.
  # Site key is BUILD-only because NEXT_PUBLIC_* values are inlined during next build.
  # Secret key is runtime-only so verification remains backend-authoritative.
  # Keep key material environment-specific: prefer Firebase console or apphosting.<env>.yaml.
  - variable: NEXT_PUBLIC_RECAPTCHA_ENTERPRISE_SITE_KEY
     value: "replace-with-recaptcha-enterprise-site-key"
     availability:
       - BUILD

  - variable: RECAPTCHA_ENTERPRISE_SECRET_KEY
     secret: 6Le3A68sAAAAACax6yRuEXhOYORGKYzLDVzvqS2a
     availability:
      - RUNTIME

  # Optional legacy alias for the server route fallback.
  # - variable: RECAPTCHA_SECRET_KEY
  #   secret: recaptcha-secret-key
  #   availability:
  #     - RUNTIME

  - variable: RECAPTCHA_ENTERPRISE_MIN_SCORE
    value: "0.5"
    availability:
      - RUNTIME

  # Non-secret runtime env used by the server.
  - variable: FIREBASE_PROJECT_ID
    value: "zootopia2026"
    availability:
      - RUNTIME

  - variable: FIREBASE_STORAGE_BUCKET
    value: "zootopia2026.firebasestorage.app"
    availability:
      - RUNTIME

  - variable: ZOOTOPIA_ADMIN_EMAILS
    value: "alahlyeagle@gmail.com,elmahdy@admin.com,alahlyeagle13@gmail.com"
    availability:
      - RUNTIME

  - variable: ZOOTOPIA_SESSION_TTL_SECONDS
    value: "3600"
    availability:
      - RUNTIME

  # Default successful assessment credits per UTC day for regular users.
  # The server falls back to 3 when this is missing/invalid.
  - variable: ZOOTOPIA_DEFAULT_DAILY_ASSESSMENT_CREDITS
    value: "3"
    availability:
      - RUNTIME

  # Optional legacy alias read by the same server parser.
  # Keep a non-empty value for active entries so App Hosting validation passes.
  - variable: DEFAULT_DAILY_ASSESSMENT_CREDITS
    value: "3"
    availability:
      - RUNTIME

  - variable: DASHSCOPE_BASE_URL
    value: "https://dashscope-us.aliyuncs.com/compatible-mode/v1"
    availability:
      - RUNTIME

  # Optional aliases for compatibility with older configs/scripts.
  # Keep blank or omit unless you need to override DASHSCOPE_BASE_URL.
  # - variable: DASHSCOPE_COMPATIBLE_BASE_URL
  #   value: ""
  #   availability:
  #     - RUNTIME

  # - variable: ALIBABA_MODEL_STUDIO_BASE_URL
  #   value: ""
  #   availability:
  #     - RUNTIME

  - variable: GOOGLE_AI_MODEL
    value: "gemini-3.1-flash-lite-preview"
    availability:
      - RUNTIME

  - variable: GOOGLE_AI_ADVANCED_MODEL
    value: "gemini-2.5-pro"
    availability:
      - RUNTIME

  - variable: QWEN_MODEL
    value: "qwen3.5-flash"
    availability:
      - RUNTIME

  # Contact relay non-secret runtime defaults (only used when /api/contact is enabled).
  - variable: SMTP_HOST
    value: "smtp.gmail.com"
    availability:
      - RUNTIME

  - variable: SMTP_PORT
    value: "587"
    availability:
      - RUNTIME

  - variable: SMTP_SECURE
    value: "false"
    availability:
      - RUNTIME

  # Admin sign-in passwords are managed in Firebase Auth records.
  # Do not add any runtime shared-password environment variable here.

  # Secret Manager references.
  # Create with: firebase apphosting:secrets:set <secret-name>
  # Keep secret values out of source control.
  # Keep this list aligned with scripts/firebase/set-apphosting-secrets-firebase-only.ps1.

  # Primary AI secret for the default Gemini runtime path.
  - variable: GOOGLE_AI_API_KEY
    secret: google-ai-api-key
    availability:
      - RUNTIME

  # Optional secrets for additional providers/features.
  # Uncomment entries only for features you actually use.

  - variable: DASHSCOPE_API_KEY
    secret: dashscope-api-key
    availability:
      - RUNTIME

  - variable: SMTP_USER
    secret: smtp-user
    availability:
      - RUNTIME

  - variable: SMTP_PASS
    secret: smtp-pass
    availability:
      - RUNTIME

  - variable: EMAIL_FROM
    secret: smtp-email-from
    availability:
      - RUNTIME

  - variable: CONTACT_FORM_TO
    secret: contact-form-to
    availability:
      - RUNTIME

  # Optional maintenance secret. Uncomment only when scheduler-driven
  # /api/internal/maintenance/expired-uploads invocations are enabled.
  # - variable: ZOOTOPIA_MAINTENANCE_SECRET
  #   secret: zootopia-maintenance-secret
  #   availability:
  #     - RUNTIME

  # Optional Firebase service-account fallback when managed runtime identity
  # is not used. Keep these secrets commented unless needed.
  - variable: FIREBASE_CLIENT_EMAIL
    secret: firebase-client-email
    availability:
      - RUNTIME

  - variable: FIREBASE_PRIVATE_KEY
    secret: firebase-private-key
    availability:
      - RUNTIME

# Note:
# FIREBASE_WEBAPP_CONFIG is still auto-populated by App Hosting for linked web apps.
# apps/web/next.config.ts keeps a backfill safety net from FIREBASE_WEBAPP_CONFIG to
# NEXT_PUBLIC_FIREBASE_* if those keys are missing.
