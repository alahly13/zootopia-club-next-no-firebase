# Settings for Backend (on Cloud Run).
# See https://firebase.google.com/docs/app-hosting/configure#cloud-run
runConfig:
  minInstances: 0
  # maxInstances: 100
  # concurrency: 80
  # cpu: 1
  # memoryMiB: 512

# Environment variables and secrets.
# env:
  # Configure environment variables.
  # See https://firebase.google.com/docs/app-hosting/configure#user-defined-environment
  # - variable: MESSAGE
  #   value: Hello world!
  #   availability:
  #     - BUILD
  #     - RUNTIME

  # Grant access to secrets in Cloud Secret Manager.
  # You can create secrets with the CLI command `firebase apphosting:secrets:set <secretName>`.
  # See https://firebase.google.com/docs/app-hosting/configure#secret-parameters
  # - variable: MY_SECRET
  #   secret: mySecretRef

# Production note for session/upload lifecycle hardening:
# - Set ZOOTOPIA_SESSION_TTL_SECONDS (default 3600) as a runtime env var.
# - Optionally set ZOOTOPIA_MAINTENANCE_SECRET and invoke
#   POST /api/internal/maintenance/expired-uploads from Cloud Scheduler with
#   Authorization: Bearer <secret> for deterministic expired-upload cleanup.
#
# Firebase public web config note:
# - App Hosting injects FIREBASE_WEBAPP_CONFIG for backend-linked Firebase web apps.
# - apps/web/next.config.ts backfills NEXT_PUBLIC_FIREBASE_* from that build-time value,
#   so duplicating public Firebase vars in this file is optional.
#
# Common server-only runtime env/secrets for this app:
# - GOOGLE_AI_API_KEY and/or DASHSCOPE_API_KEY
# - SMTP_HOST, SMTP_PORT, SMTP_SECURE, SMTP_USER, SMTP_PASS, EMAIL_FROM, CONTACT_FORM_TO
#   (required only when using the public /contact relay)
# - Optional AI overrides: DASHSCOPE_BASE_URL, DASHSCOPE_COMPATIBLE_BASE_URL,
#   ALIBABA_MODEL_STUDIO_BASE_URL, GOOGLE_AI_MODEL, GOOGLE_AI_ADVANCED_MODEL, QWEN_MODEL
